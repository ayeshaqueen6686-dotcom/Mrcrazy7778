<!DOCTYPE html>
<html lang="ur" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MrCrazy SERVERS | Premium</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg: #05070a;
      --card-bg: rgba(255, 255, 255, 0.05);
      --accent: #00f2ff;
      --green: #00ffaa;
      --text: #ffffff;
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', 'Segoe UI', sans-serif; }

    body {
      background: radial-gradient(circle at top right, #1a1a2e, #05070a);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* --- MAIN PAGE STYLE --- */
    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      width: 100%;
      max-width: 450px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
    }

    .banner-title {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(to right, #fff, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
    }

    .profile-img {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      padding: 5px; margin-bottom: 20px;
    }

    .btn {
      width: 100%; padding: 16px; margin-bottom: 15px;
      border: none; border-radius: 15px; font-size: 1.1rem;
      font-weight: 600; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 12px;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-primary { background: linear-gradient(135deg, var(--accent), #0072ff); color: white; }
    .btn-secondary { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--glass-border); }
    .btn:hover { transform: scale(1.03); }

    /* --- POPUP SYSTEM STYLE --- */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      display: flex; justify-content: center; align-items: center;
      z-index: 9999;
      opacity: 0; visibility: hidden;
      transition: all 0.5s ease;
    }

    .overlay.active { opacity: 1; visibility: visible; }

    .pop-card {
      background: #11141f;
      width: 90%; max-width: 380px;
      padding: 35px 25px;
      border-radius: 25px;
      border: 1px solid var(--accent);
      text-align: center;
      position: relative;
      transform: scale(0.8);
      transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.active .pop-card { transform: scale(1); }

    .close-btn {
      position: absolute; top: 15px; right: 15px;
      background: rgba(255, 255, 255, 0.1);
      border: none; color: white; width: 35px; height: 35px;
      border-radius: 50%; cursor: pointer;
      display: none; align-items: center; justify-content: center;
    }

    .app-icon {
      width: 85px; height: 85px; border-radius: 18px;
      margin-bottom: 20px; border: 2px solid var(--accent);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .urdu-msg {
      font-size: 1.05rem; color: #cbd5e0;
      line-height: 1.7; margin: 20px 0;
    }

    #timer-display { color: #888; font-size: 0.85rem; margin-bottom: 10px; }

    .btn-download {
      background: linear-gradient(135deg, var(--green), #00a870);
      color: #000; text-decoration: none;
    }

    .report-link {
      display: block; margin-top: 15px; color: #ff4d4d;
      text-decoration: none; font-size: 0.9rem;
    }

  </style>
</head>
<body>

  <!-- MAIN PAGE CONTENT -->
  <div class="main-card">
    <div class="banner-title">MrCrazy SERVERS</div>
    <img src="https://i.ibb.co/zWxZwZn8/Screenshot-20260309-142655.png" class="profile-img" alt="Logo">
    <div style="color: var(--green); margin-bottom: 25px; font-weight: bold;">Official Digital Company</div>
    
    <button class="btn btn-primary" onclick="window.open('https://mrcrazydevstudioofficial.netlify.app/', '_blank')">
      <i class="fas fa-rocket"></i> Login Dashboard
    </button>

    <button class="btn btn-secondary" onclick="window.open('https://mrcrazydevstudio.netlify.app/', '_blank')">
      <i class="fas fa-sim-card"></i> SIM Details Check
    </button>
  </div>

  <!-- POPUP OVERLAY -->
  <div class="overlay" id="popupOverlay">
    <div class="pop-card">
      <button class="close-btn" id="closeBtn" onclick="closePopup()">
        <i class="fas fa-times"></i>
      </button>

      <img src="https://i.ibb.co/J6dcg09/Pics-Art-05-22-10-08-32.jpg" alt="App Icon" class="app-icon">
      
      <div style="color:var(--accent); font-weight:800; font-size:1.4rem;">MrCrazy Apps Store</div>
      
      <p class="urdu-msg">
        آپکی آسانی کے لیے ہم نے ایپ بنا دی ہے، آپ ابھی ڈاؤن لوڈ پر کلک کریں اور ہماری ایپ ڈاؤن لوڈ کریں۔ آپ کے تعاون کا شکریہ۔
      </p>

      <div id="timer-display">Wait <span id="seconds">10</span>s to close</div>

      <a href="https://www.mediafire.com/file/6fnu1uagz60wfqr/MrCrazy_Apps_Store_1.0.apk/file" class="btn btn-download" target="_blank">
        <i class="fas fa-cloud-download-alt"></i> Download App
      </a>

      <a href="https://wa.me/9779761970136" class="report-link">
        <i class="fas fa-exclamation-triangle"></i> Report Issue on WhatsApp
      </a>
    </div>
  </div>

  <script>
    // Page load hone ke 1 sec baad popup dikhayein
    window.onload = function() {
      setTimeout(() => {
        document.getElementById('popupOverlay').classList.add('active');
        startCountdown();
      }, 1000);
    };

    function startCountdown() {
      let timeLeft = 10;
      const secondsSpan = document.getElementById('seconds');
      const timerText = document.getElementById('timer-display');
      const closeBtn = document.getElementById('closeBtn');

      const timer = setInterval(() => {
        timeLeft--;
        secondsSpan.innerText = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timer);
          timerText.style.visibility = 'hidden';
          closeBtn.style.display = 'flex'; // 10 sec baad close button dikhega
        }
      }, 1000);
    }

    function closePopup() {
      document.getElementById('popupOverlay').classList.remove('active');
    }
  </script>

</body>
</html>
