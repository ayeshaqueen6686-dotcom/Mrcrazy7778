<!DOCTYPE html>
<html lang="ur" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MrCrazy SERVERS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg: #0a0b14;
      --surface: #11141f;
      --text: #e0f0ff;
      --accent: #00e5ff;
      --green: #00ffaa;
      --border: rgba(0, 229, 255, 0.25);
      --shadow: rgba(0, 229, 255, 0.25);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 15px;
      line-height: 1.6;
    }
    .banner {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(135deg, #0f1328, #1a2238);
      padding: 20px 0;
      text-align: center;
      border: 2px solid var(--border);
      box-shadow: 0 0 40px var(--shadow);
      margin-bottom: 45px;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }
    .banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
      animation: rotate 25s linear infinite;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .banner h1 {
      font-size: 2.1rem;
      font-weight: 800;
      letter-spacing: 6px;
      background: linear-gradient(90deg, #ffffff, var(--accent), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px rgba(0,229,255,0.5);
    }
    .container {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }
    .profile {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 30px;
      border: 4px solid var(--green);
      box-shadow: 0 0 45px rgba(0,255,170,0.4);
    }
    .profile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .company-title {
      font-size: 1.45rem;
      color: var(--accent);
      margin-bottom: 35px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .updated-text {
      font-size: 1.35rem;
      color: var(--green);
      margin: 25px 0 12px;
      font-weight: 600;
    }
    .urdu-guide {
      font-size: 1.05rem;
      color: #a0c0ff;
      margin-bottom: 20px;
    }
    .hand-pointer {
      font-size: 3.2rem;           /* Chhota kar diya */
      animation: bounce 2.2s infinite ease-in-out;
      color: var(--green);
      margin-bottom: 45px;
      text-shadow: 0 0 20px var(--green);
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
    /* Buttons */
    .btn {
      width: 100%;
      max-width: 420px;
      padding: 17px 25px;
      margin: 12px auto;
      font-size: 1.22rem;           /* Font small kiya */
      font-weight: 700;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.4s ease;
      box-shadow: 0 10px 30px rgba(0,229,255,0.3);
    }
    .btn-login {
      background: linear-gradient(135deg, var(--green), var(--accent));
      color: #0a0b14;
    }
    .btn-login:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 45px rgba(0,229,255,0.55);
    }
    .btn-sim {
      background: linear-gradient(135deg, #0066ff, #00aaff);
      color: white;
    }
    .btn-sim:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 45px rgba(0, 102, 255, 0.55);
    }
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 16px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      z-index: 100;
    }
    .footer-note {
      margin-top: 70px;
      font-size: 0.95rem;
      color: #6b8ab8;
      text-align: center;
      max-width: 420px;
    }

    @media (max-width: 480px) {
      .banner h1 { font-size: 1.85rem; letter-spacing: 4px; }
      .profile { width: 105px; height: 105px; }
      .btn { font-size: 1.15rem; padding: 15px 20px; }
    }
  </style>
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()">Light Mode</button>

  <div class="banner">
    <h1>MrCrazy SERVERS</h1>
  </div>

  <div class="container">

    <div class="profile">
      <img src="https://i.ibb.co/zWxZwZn8/Screenshot-20260309-142655.png" alt="MrCrazyTeam">
    </div>

    <div class="company-title">MrCrazy Digital Company</div>

    <div class="updated-text">Website Updated</div>
    <div class="urdu-guide">آگے بڑھنے کے لیے نیچے کلک کریں</div>
    <div class="hand-pointer">👇</div>

    <!-- Login Button -->
    <button class="btn btn-login" onclick="window.open('https://mrcrazydevstudioofficial.netlify.app/', '_blank')">
      <i class="fas fa-sign-in-alt"></i> 
      Click Here & Login
    </button>

    <!-- New SIM Details Check Button -->
    <button class="btn btn-sim" onclick="window.open('https://mrcrazydevstudio.netlify.app/', '_blank')">
      <i class="fas fa-sim-card"></i> 
      SIM DETAILS CHECK
    </button>

  </div>

  <div class="footer-note">
    MrCrazy Digital Company © 2026 — Secure • Professional • Premium
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.querySelector('.theme-toggle');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        btn.textContent = 'Dark Mode';
      } else {
        html.setAttribute('data-theme', 'dark');
        btn.textContent = 'Light Mode';
      }
    }
  </script>

</body>
</html>
